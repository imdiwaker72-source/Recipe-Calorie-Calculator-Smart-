    margin-top:25px;

</head>

<body>

<div class="container">

<h1>🍽️ Smart Recipe Calorie Calculator</h1>

<p>
Enter ingredients separated by commas.<br>
Example: <b>2 eggs, 1 toast, 1 cup milk, 1 banana</b>
</p>

<textarea id="input" placeholder="Enter your ingredients here..."></textarea>

<button onclick="calculateCalories()">Calculate Calories</button>

<div id="result" class="result"></div>

<div class="footer">
Powered by 
<a href="https://goodmorningmessages.xyz" target="_blank">
Good Morning Messages

curry:{cal:180,protein:6,carbs:10,fat:14},
dal:{cal:198,protein:12,carbs:30,fat:3}

};

function calculateCalories(){

    let input = document.getElementById("input").value.toLowerCase();

    if(input.trim() === ""){
        alert("Please enter ingredients");
        return;
    }

    let items = input.split(",");

    let total = {
        cal:0,
        protein:0,
        carbs:0,
        fat:0
    };

    let notFoundFoods = [];

    items.forEach(item => {

        item = item.trim();

        let qtyMatch = item.match(/\d+/);

        let qty = qtyMatch ? parseInt(qtyMatch[0]) : 1;

        let found = false;

        for(let food in foodDB){

            if(item.includes(food)){

                total.cal += foodDB[food].cal * qty;
                total.protein += foodDB[food].protein * qty;
                total.carbs += foodDB[food].carbs * qty;
                total.fat += foodDB[food].fat * qty;

                found = true;
                break;
            }
        }

        if(!found){
            notFoundFoods.push(item);
        }

    });

    let html = `
        <h2>📊 Nutrition Breakdown</h2>

        <p><b>Calories:</b> ${total.cal} kcal</p>

        <p><b>Protein:</b> ${total.protein} g</p>

        <p><b>Carbs:</b> ${total.carbs} g</p>

        <p><b>Fat:</b> ${total.fat} g</p>
    `;

    if(notFoundFoods.length > 0){

        html += `
        <div class="notfound">
            <b>❌ Not Found:</b><br>
            ${notFoundFoods.join(", ")}
        </div>
        `;
    }

    document.getElementById("result").innerHTML = html;
    document.getElementById("result").style.display = "block";

}

</script>

</body>
</html>
